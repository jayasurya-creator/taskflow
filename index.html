<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #f5f2ee;
      --surface: #ffffff;
      --surface2: #ede9e3;
      --border: #ddd8d0;
      --text: #1a1714;
      --text-muted: #7a7470;
      --accent: #e8500a;
      --accent-light: #fde8dd;
      --done-bg: #eaf5ee;
      --done-text: #2a7a42;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.14);
      --radius: 16px;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }
 
    [data-theme="dark"] {
      --bg: #131110;
      --surface: #1e1c1a;
      --surface2: #252220;
      --border: #332f2c;
      --text: #f0ebe4;
      --text-muted: #7a7470;
      --accent: #f06a2a;
      --accent-light: #3a1f10;
      --done-bg: #122318;
      --done-text: #5bcf7e;
      --shadow: 0 2px 16px rgba(0,0,0,0.4);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.5);
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      padding-bottom: 60px;
    }
 
    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      transition: background var(--transition), border-color var(--transition);
    }
 
    .header-inner {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
 
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
 
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
 
    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      letter-spacing: -0.03em;
    }
 
    .header-actions { display: flex; align-items: center; gap: 12px; }
 
    .theme-toggle {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
      color: var(--text);
    }
    .theme-toggle:hover { border-color: var(--accent); transform: rotate(20deg); }
 
    /* ── Main ── */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 36px 24px 0;
    }
 
    /* ── Stats bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
 
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: background var(--transition), border-color var(--transition);
    }
 
    .stat-card .label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
 
    .stat-card .value {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.9rem;
      line-height: 1;
      transition: color 0.2s;
    }
 
    #stat-total .value { color: var(--text); }
    #stat-pending .value { color: var(--accent); }
    #stat-done .value { color: var(--done-text); }
 
    /* ── Input area ── */
    .input-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      transition: background var(--transition), border-color var(--transition);
      box-shadow: var(--shadow);
    }
 
    .input-row {
      display: flex;
      gap: 10px;
    }
 
    #task-input {
      flex: 1;
      padding: 13px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }
    #task-input::placeholder { color: var(--text-muted); }
    #task-input:focus { border-color: var(--accent); background: var(--surface); }
 
    .btn-add {
      padding: 13px 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      letter-spacing: 0.02em;
      display: flex; align-items: center; gap: 6px;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .btn-add:hover { background: #c94308; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(232,80,10,0.35); }
    .btn-add:active { transform: translateY(0); }
    .btn-add span { font-size: 1.1rem; }
 
    /* ── Filter tabs ── */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 5px;
      transition: background var(--transition);
    }
 
    .filter-btn {
      flex: 1;
      padding: 9px 14px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all var(--transition);
    }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .filter-btn:not(.active):hover { color: var(--text); background: var(--surface2); }
 
    /* ── Task list ── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }
 
    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all var(--transition);
      box-shadow: var(--shadow);
      animation: slideIn 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-item:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
 
    .task-item.completed {
      background: var(--done-bg);
      border-color: transparent;
    }
 
    .check-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: all var(--transition);
      color: transparent;
    }
    .check-btn:hover { border-color: var(--accent); }
    .task-item.completed .check-btn {
      background: var(--done-text);
      border-color: var(--done-text);
      color: #fff;
    }
 
    .task-content { flex: 1; min-width: 0; }
 
    .task-text {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text);
      word-break: break-word;
      transition: color var(--transition);
      line-height: 1.4;
    }
    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }
 
    .task-edit-input {
      width: 100%;
      padding: 4px 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      outline: none;
    }
 
    .task-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .task-item:hover .task-actions { opacity: 1; }
 
    .action-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all var(--transition);
    }
    .action-btn.edit:hover { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }
    .action-btn.delete:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; }
    [data-theme="dark"] .action-btn.edit:hover { background: #1e2a3a; }
    [data-theme="dark"] .action-btn.delete:hover { background: #2a1515; }
 
    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      display: none;
    }
    .empty-state.show { display: block; }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 14px; }
    .empty-state p { font-size: 0.95rem; line-height: 1.6; }
    .empty-state strong { color: var(--text); font-weight: 600; }
 
    /* ── Clear completed ── */
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .bottom-bar span { font-size: 0.82rem; color: var(--text-muted); }
    .clear-btn {
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background var(--transition);
    }
    .clear-btn:hover { background: var(--accent-light); }
    .clear-btn:disabled { color: var(--text-muted); cursor: default; }
    .clear-btn:disabled:hover { background: none; }
 
    /* ── Progress bar ── */
    .progress-wrap {
      margin-bottom: 22px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .progress-track {
      height: 5px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #f59e0b);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }
    .progress-fill.complete { background: linear-gradient(90deg, #22c55e, #16a34a); }
 
    /* Responsive */
    @media (max-width: 480px) {
      .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-card { padding: 12px 10px; }
      .stat-card .value { font-size: 1.4rem; }
      .input-row { flex-direction: column; }
      .btn-add { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
 
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <h1>TaskFlow</h1>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </div>
</header>
 
<main>
 
  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card" id="stat-total">
      <div class="label">Total</div>
      <div class="value" id="count-total">0</div>
    </div>
    <div class="stat-card" id="stat-pending">
      <div class="label">Pending</div>
      <div class="value" id="count-pending">0</div>
    </div>
    <div class="stat-card" id="stat-done">
      <div class="label">Done</div>
      <div class="value" id="count-done">0</div>
    </div>
  </div>
 
  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
 
  <!-- Input -->
  <div class="input-section">
    <div class="input-row">
      <input type="text" id="task-input" placeholder="What needs to be done today?" maxlength="200" autocomplete="off"/>
      <button class="btn-add" id="add-btn">
        <span>+</span> Add Task
      </button>
    </div>
  </div>
 
  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>
 
  <!-- Task list -->
  <div class="task-list" id="task-list"></div>
 
  <!-- Empty state -->
  <div class="empty-state" id="empty-state">
    <div class="emoji">📋</div>
    <p id="empty-msg"><strong>Your list is clear!</strong><br/>Add a task above to get started.</p>
  </div>
 
  <!-- Bottom bar -->
  <div class="bottom-bar" id="bottom-bar" style="display:none">
    <span id="item-count-label"></span>
    <button class="clear-btn" id="clear-completed-btn">Clear Completed</button>
  </div>
 
</main>
 
<script>
  // ─────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────
  let tasks = [];
  let filter = 'all';
 
  const STORAGE_KEY = 'taskflow_tasks_v2';
  const THEME_KEY   = 'taskflow_theme';
 
  // ─────────────────────────────────────────
  // DOM REFS
  // ─────────────────────────────────────────
  const taskInput       = document.getElementById('task-input');
  const addBtn          = document.getElementById('add-btn');
  const taskList        = document.getElementById('task-list');
  const emptyState      = document.getElementById('empty-state');
  const emptyMsg        = document.getElementById('empty-msg');
  const bottomBar       = document.getElementById('bottom-bar');
  const itemCountLabel  = document.getElementById('item-count-label');
  const clearCompBtn    = document.getElementById('clear-completed-btn');
  const themeToggle     = document.getElementById('theme-toggle');
  const filterBtns      = document.querySelectorAll('.filter-btn');
  const countTotal      = document.getElementById('count-total');
  const countPending    = document.getElementById('count-pending');
  const countDone       = document.getElementById('count-done');
  const progressFill    = document.getElementById('progress-fill');
  const progressPct     = document.getElementById('progress-pct');
 
  // ─────────────────────────────────────────
  // STORAGE
  // ─────────────────────────────────────────
  function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }
 
  function loadTasks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      tasks = raw ? JSON.parse(raw) : [];
    } catch { tasks = []; }
  }
 
  // ─────────────────────────────────────────
  // THEME
  // ─────────────────────────────────────────
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem(THEME_KEY, theme);
  }
 
  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });
 
  // ─────────────────────────────────────────
  // FILTERING
  // ─────────────────────────────────────────
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      renderTasks();
    });
  });
 
  function getFilteredTasks() {
    if (filter === 'pending')   return tasks.filter(t => !t.completed);
    if (filter === 'completed') return tasks.filter(t => t.completed);
    return tasks;
  }
 
  // ─────────────────────────────────────────
  // RENDER
  // ─────────────────────────────────────────
  function renderTasks() {
    const visible = getFilteredTasks();
    taskList.innerHTML = '';
 
    const total     = tasks.length;
    const done      = tasks.filter(t => t.completed).length;
    const pending   = total - done;
    const pct       = total > 0 ? Math.round((done / total) * 100) : 0;
 
    countTotal.textContent   = total;
    countPending.textContent = pending;
    countDone.textContent    = done;
    progressFill.style.width = pct + '%';
    progressPct.textContent  = pct + '%';
    progressFill.classList.toggle('complete', pct === 100 && total > 0);
 
    if (visible.length === 0) {
      emptyState.classList.add('show');
      if (filter === 'completed')
        emptyMsg.innerHTML = '<strong>No completed tasks yet.</strong><br/>Finish something to see it here.';
      else if (filter === 'pending')
        emptyMsg.innerHTML = '<strong>All caught up! 🎉</strong><br/>No pending tasks.';
      else
        emptyMsg.innerHTML = '<strong>Your list is clear!</strong><br/>Add a task above to get started.';
    } else {
      emptyState.classList.remove('show');
      visible.forEach(task => taskList.appendChild(createTaskEl(task)));
    }
 
    if (total > 0) {
      bottomBar.style.display = 'flex';
      const rem = pending;
      itemCountLabel.textContent = rem === 0
        ? 'All tasks completed 🎉'
        : `${rem} task${rem !== 1 ? 's' : ''} left`;
      clearCompBtn.disabled = done === 0;
    } else {
      bottomBar.style.display = 'none';
    }
  }
 
  // ─────────────────────────────────────────
  // CREATE TASK ELEMENT
  // ─────────────────────────────────────────
  function createTaskEl(task) {
    const item = document.createElement('div');
    item.className = 'task-item' + (task.completed ? ' completed' : '');
    item.dataset.id = task.id;
 
    item.innerHTML = `
      <button class="check-btn" title="${task.completed ? 'Mark incomplete' : 'Mark complete'}">
        ${task.completed ? '✓' : ''}
      </button>
      <div class="task-content">
        <span class="task-text">${escapeHtml(task.text)}</span>
      </div>
      <div class="task-actions">
        <button class="action-btn edit" title="Edit task">✏️</button>
        <button class="action-btn delete" title="Delete task">🗑️</button>
      </div>
    `;
 
    item.querySelector('.check-btn').addEventListener('click', () => toggleTask(task.id));
    item.querySelector('.action-btn.delete').addEventListener('click', () => deleteTask(task.id));
    item.querySelector('.action-btn.edit').addEventListener('click', () => startEdit(task.id, item));
 
    return item;
  }
 
  // ─────────────────────────────────────────
  // ADD TASK
  // ─────────────────────────────────────────
  function addTask() {
    const text = taskInput.value.trim();
    if (!text) {
      taskInput.focus();
      taskInput.style.borderColor = '#ef4444';
      setTimeout(() => taskInput.style.borderColor = '', 800);
      return;
    }
    tasks.unshift({ id: Date.now(), text, completed: false });
    saveTasks();
    taskInput.value = '';
    // switch to all view so user sees new task
    if (filter !== 'all') {
      filterBtns.forEach(b => b.classList.remove('active'));
      document.querySelector('[data-filter="all"]').classList.add('active');
      filter = 'all';
    }
    renderTasks();
    taskInput.focus();
  }
 
  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
 
  // ─────────────────────────────────────────
  // TOGGLE COMPLETE
  // ─────────────────────────────────────────
  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
    saveTasks();
    renderTasks();
  }
 
  // ─────────────────────────────────────────
  // DELETE TASK
  // ─────────────────────────────────────────
  function deleteTask(id) {
    const item = taskList.querySelector(`[data-id="${id}"]`);
    if (item) {
      item.style.transition = 'all 0.22s ease';
      item.style.opacity = '0';
      item.style.transform = 'translateX(30px)';
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderTasks();
      }, 220);
    }
  }
 
  // ─────────────────────────────────────────
  // EDIT TASK
  // ─────────────────────────────────────────
  function startEdit(id, item) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    const textEl = item.querySelector('.task-text');
    const origText = task.text;
    const input = document.createElement('input');
    input.className = 'task-edit-input';
    input.value = origText;
    textEl.replaceWith(input);
    input.focus();
    input.select();
 
    function saveEdit() {
      const newText = input.value.trim();
      if (newText && newText !== origText) {
        tasks = tasks.map(t => t.id === id ? { ...t, text: newText } : t);
        saveTasks();
      }
      renderTasks();
    }
 
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveEdit();
      if (e.key === 'Escape') renderTasks();
    });
    input.addEventListener('blur', saveEdit);
  }
 
  // ─────────────────────────────────────────
  // CLEAR COMPLETED
  // ─────────────────────────────────────────
  clearCompBtn.addEventListener('click', () => {
    tasks = tasks.filter(t => !t.completed);
    saveTasks();
    renderTasks();
  });
 
  // ─────────────────────────────────────────
  // HELPERS
  // ─────────────────────────────────────────
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }
 
  // ─────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────
  (function init() {
    loadTasks();
    const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
    applyTheme(savedTheme);
    renderTasks();
  })();
</script>
</body>
</html>
